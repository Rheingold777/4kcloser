<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4kCloser | Closing Industry Insights</title>
    <meta name="description" content="Helping notaries, title companies, realtors, and lenders solve pain points. Real talk. Real solutions.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
        
        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .tagline {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        .highlight {
            color: #fbbf24;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }
        
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        
        .link-btn svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }
        
        .link-btn.instagram { border-left: 3px solid #E4405F; }
        .link-btn.facebook { border-left: 3px solid #1877F2; }
        .link-btn.tiktok { border-left: 3px solid #00f2ea; }
        .link-btn.twitter { border-left: 3px solid #ffffff; }
        
        .coming-soon {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .coming-soon::after {
            content: " (Coming Soon)";
            font-size: 0.75rem;
            color: #94a3b8;
        }
        
        .footer {
            margin-top: 40px;
            color: #64748b;
            font-size: 0.85rem;
        }
        
        .footer a {
            color: #94a3b8;
            text-decoration: none;
        }
        
        .audience-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }
        
        .tag {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
