<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="270" x2="1080" y2="270" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="540" x2="1080" y2="540" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="810" x2="1080" y2="810" stroke="#ffffff" stroke-width="1"/>
    <line x1="270" y1="0" x2="270" y2="1080" stroke="#ffffff" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="1080" stroke="#ffffff" stroke-width="1"/>
    <line x1="810" y1="0" x2="810" y2="1080" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Main text -->
  <text x="540" y="380" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff">The closing industry</text>
  <text x="540" y="480" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#fbbf24">is broken.</text>
  
  <!-- Subtext -->
  <text x="540" y="600" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="32" fill="#94a3b8">Notaries. Title. Realtors. Lenders.</text>
  <text x="540" y="650" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="32" fill="#94a3b8">We're here to fix it.</text>
  
  <!-- Logo area -->
  <text x="540" y="820" text-anchor="middle" font-size="64">🎯</text>
  <text x="540" y="890" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff">4kCloser</text>
  
  <!-- Tagline -->
  <text x="540" y="950" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="24" fill="#fbbf24" font-weight="600">CLOSE BETTER.</text>
</svg>
