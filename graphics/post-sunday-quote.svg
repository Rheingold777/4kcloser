<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Quote marks -->
  <text x="120" y="300" font-family="Georgia, serif" font-size="200" fill="rgba(251,191,36,0.2)">"</text>
  
  <!-- Quote text -->
  <text x="540" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#ffffff" font-style="italic">The details are not</text>
  <text x="540" y="485" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#ffffff" font-style="italic">the details.</text>
  <text x="540" y="580" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#fbbf24" font-style="italic">They make the design.</text>
  
  <!-- Attribution -->
  <text x="540" y="700" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="24" fill="#94a3b8">— Charles Eames</text>
  
  <!-- Divider -->
  <line x1="440" y1="780" x2="640" y2="780" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- Application -->
  <text x="540" y="860" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="28" fill="#ffffff">In closings, the details</text>
  <text x="540" y="910" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="28" fill="#fbbf24" font-weight="600">ARE the deal.</text>
  
  <!-- Logo -->
  <text x="500" y="1000" text-anchor="middle" font-size="32">🎯</text>
  <text x="580" y="1000" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#94a3b8">4kCloser</text>
</svg>
