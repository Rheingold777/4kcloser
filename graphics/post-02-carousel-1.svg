<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Top badge -->
  <rect x="340" y="120" width="400" height="50" rx="25" fill="rgba(251,191,36,0.15)"/>
  <text x="540" y="155" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#fbbf24" font-weight="600">NOTARY REALITY CHECK</text>
  
  <!-- Main text -->
  <text x="540" y="380" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff">3 things lenders</text>
  <text x="540" y="460" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff">expect us to fix</text>
  <text x="540" y="560" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="64" fill="#fbbf24">(that aren't our job)</text>
  
  <!-- Eyes emoji row -->
  <text x="540" y="700" text-anchor="middle" font-size="80">👀</text>
  
  <!-- Swipe indicator -->
  <text x="540" y="880" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="28" fill="#94a3b8">Swipe to see if you've dealt with these →</text>
  
  <!-- Logo -->
  <text x="940" y="1000" text-anchor="middle" font-size="32">🎯</text>
  <text x="1000" y="1000" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#94a3b8">4kCloser</text>
  
  <!-- Page indicator -->
  <circle cx="500" cy="1020" r="8" fill="#fbbf24"/>
  <circle cx="530" cy="1020" r="8" fill="#64748b"/>
  <circle cx="560" cy="1020" r="8" fill="#64748b"/>
</svg>
