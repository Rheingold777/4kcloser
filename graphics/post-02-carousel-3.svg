<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Main text -->
  <text x="540" y="400" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="48" fill="#ffffff" font-weight="700">None of this is our job.</text>
  
  <text x="540" y="520" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="56" fill="#fbbf24" font-weight="700">But we fix it anyway.</text>
  
  <!-- Target emoji -->
  <text x="540" y="700" text-anchor="middle" font-size="120">🎯</text>
  
  <!-- CTA -->
  <rect x="340" y="820" width="400" height="70" rx="35" fill="#fbbf24"/>
  <text x="540" y="868" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="28" fill="#1a1a2e" font-weight="700">Follow for more</text>
  
  <!-- Logo -->
  <text x="540" y="980" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#94a3b8">@4kCloser</text>
  
  <!-- Page indicator -->
  <circle cx="500" cy="1020" r="8" fill="#64748b"/>
  <circle cx="530" cy="1020" r="8" fill="#64748b"/>
  <circle cx="560" cy="1020" r="8" fill="#fbbf24"/>
</svg>
