<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 4K with small key icon - cleaner -->
  
  <!-- 4K text -->
  <text x="100" y="115" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff">4K</text>
  
  <!-- Small key icon below -->
  <g transform="translate(75, 135)">
    <!-- Key head -->
    <circle cx="12" cy="12" r="10" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <!-- Key shaft -->
    <line x1="22" y1="12" x2="50" y2="12" stroke="#fbbf24" stroke-width="3"/>
    <!-- Key teeth -->
    <line x1="38" y1="12" x2="38" y2="20" stroke="#fbbf24" stroke-width="3"/>
    <line x1="46" y1="12" x2="46" y2="18" stroke="#fbbf24" stroke-width="3"/>
  </g>
</svg>
