<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Modern keyhole - rounded rectangle with circle cutout feel -->
  
  <!-- Rounded square container -->
  <rect x="30" y="30" width="140" height="140" rx="25" fill="none" stroke="#fbbf24" stroke-width="4"/>
  
  <!-- Inner keyhole shape (small, subtle) -->
  <circle cx="100" cy="85" r="18" fill="#fbbf24"/>
  <rect x="94" y="100" width="12" height="25" fill="#fbbf24"/>
  
  <!-- 4K text below keyhole -->
  <text x="100" y="165" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">4K</text>
</svg>
